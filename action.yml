name: 'Carbon-Aware Dispatcher'
description: 'Sustainable CI/CD — dispatches workflows only when the energy grid is powered by renewables. Free, zero-config for US & UK'
author: 'Open Source Climate Tech'
branding:
  icon: 'globe'
  color: 'green'

inputs:
  grid_zone:
    description: 'Single zone identifier. US: EIA BA codes (CISO, ERCO, PJM). UK: GB, GB-1..GB-17. Global: any Electricity Maps zone. Presets: "auto:detect" (detects cloud region), "auto:nearest" (picks zones closest to your timezone), "auto:green", "auto:cleanest" (zero-config), "auto:escape-coal" (dirty-grid routing), or "auto:escape-coal:IN" (escape from specific zone). If omitted, auto-detects your cloud region or falls back to auto:cleanest.'
    required: false
  grid_zones:
    description: >-
      Comma-separated list of zones, optionally with runner labels.
      Examples: "CISO,ERCO,PJM" or "CISO:runner-cal,GB:runner-uk".
      Presets: "auto:detect", "auto:nearest", "auto:green", "auto:cleanest", "auto:escape-coal", "auto:escape-coal:IN".
      The action picks the zone with the lowest carbon intensity under the threshold.
      If omitted entirely, auto-detects your cloud region or falls back to auto:cleanest.
    required: false
  eia_api_key:
    description: 'Optional EIA API key for US zones. The built-in DEMO_KEY works but has lower rate limits. Register free at https://www.eia.gov/opendata/'
    required: false
    default: ''
  max_carbon_intensity:
    description: 'Maximum gCO2eq/kWh allowed to trigger the job.'
    required: false
    default: '250'
  workflow_id:
    description: 'The filename of the workflow to dispatch (e.g., heavy-batch.yml). Omit for inline mode (just set outputs, no dispatch).'
    required: false
    default: ''
  github_token:
    description: 'A GitHub token with Actions read/write permissions. Required when workflow_id is set.'
    required: false
    default: ''
  target_ref:
    description: 'The git ref to dispatch the workflow on (default: main).'
    required: false
    default: 'main'
  fail_on_api_error:
    description: 'If true, fail the action when the carbon intensity API is unreachable instead of skipping silently.'
    required: false
    default: 'false'
  gridstatus_api_key:
    description: 'Optional GridStatus.io API key for US zone forecasts. Enables predicting when the grid will be green. Register free at https://www.gridstatus.io (1M rows/month free).'
    required: false
    default: ''
  electricity_maps_token:
    description: 'Optional Electricity Maps API token for global zone coverage (200+ zones). Register free at https://portal.electricitymaps.com/ (50 requests/hour).'
    required: false
    default: ''
  max_wait:
    description: 'Maximum minutes to wait for the grid to become green (0 = no waiting, just check and exit). The action will re-check periodically using forecasts. Note: GitHub Actions bills for wait time. Max 360 (6 hours).'
    required: false
    default: '0'
  enable_forecast:
    description: 'If true, fetch carbon intensity forecast when the grid is dirty. UK zones get free 48h forecasts. US zones require a GridStatus API key for forecasts. Global zones require an Electricity Maps token.'
    required: false
    default: 'false'
  runner_provider:
    description: 'Runner provider for automatic region-based routing. Set to "runson" to get RunsOn-formatted runner labels with the greenest AWS region. Leave empty to use custom labels from grid_zones.'
    required: false
    default: ''
  runner_spec:
    description: 'Runner machine spec for the runner provider (e.g., "4cpu-linux-arm64"). Only used when runner_provider is set. Default: "2cpu-linux-x64".'
    required: false
    default: ''
  entsoe_token:
    description: 'Optional ENTSO-E Transparency Platform security token for EU coverage (36 countries). Free registration at https://transparency.entsoe.eu/. Preferred over Electricity Maps for EU zones when set.'
    required: false
    default: ''
  strategy:
    description: 'Scheduling strategy. "check" (default): check now, dispatch if green. "queue": find the optimal green window within deadline_hours using forecasts, then dispatch at the best time.'
    required: false
    default: 'check'
  deadline_hours:
    description: 'Maximum hours to look ahead for a green window when strategy=queue. Default: 24. The action checks forecasts across all zones and outputs the optimal dispatch time.'
    required: false
    default: '24'
  carbon_policy_path:
    description: 'Path to organization-wide carbon policy file. Default: .github/carbon-policy.yml. Policy values are used as defaults; action inputs override them.'
    required: false
    default: '.github/carbon-policy.yml'

outputs:
  grid_clean:
    description: 'Whether the grid was clean enough to dispatch (true/false).'
    value: ${{ steps.grid-check.outputs.grid_clean }}
  carbon_intensity:
    description: 'The carbon intensity reading in gCO2eq/kWh, or "unknown" on API error.'
    value: ${{ steps.grid-check.outputs.carbon_intensity }}
  grid_zone:
    description: 'The zone that was selected (useful in multi-zone mode).'
    value: ${{ steps.grid-check.outputs.grid_zone }}
  runner_label:
    description: 'The runner label for the selected zone. Auto-formatted when runner_provider is set, otherwise from grid_zones config.'
    value: ${{ steps.grid-check.outputs.runner_label }}
  cloud_region:
    description: 'The nearest AWS region for the selected zone (e.g., us-west-1, eu-west-2). Useful for routing jobs to region-aware runner providers.'
    value: ${{ steps.grid-check.outputs.cloud_region }}
  gcp_region:
    description: 'The nearest GCP region for the selected zone (e.g., us-west1, europe-west3). Use with GCP-based runners or deployments.'
    value: ${{ steps.grid-check.outputs.gcp_region }}
  azure_region:
    description: 'The nearest Azure region for the selected zone (e.g., westus2, germanywestcentral). Use with Azure-based runners or deployments.'
    value: ${{ steps.grid-check.outputs.azure_region }}
  intensity_trend:
    description: 'Carbon intensity trend from recent history: "decreasing", "increasing", or "stable".'
    value: ${{ steps.grid-check.outputs.intensity_trend }}
  forecast_green_at:
    description: 'ISO 8601 timestamp of the next predicted green window (UK: free, US: requires GridStatus API key).'
    value: ${{ steps.grid-check.outputs.forecast_green_at }}
  forecast_intensity:
    description: 'Predicted carbon intensity at the next green window in gCO2eq/kWh.'
    value: ${{ steps.grid-check.outputs.forecast_intensity }}
  co2_saved_grams:
    description: 'Estimated grams of CO2 saved by running on a clean grid vs. the global average (450 gCO2eq/kWh).'
    value: ${{ steps.grid-check.outputs.co2_saved_grams }}
  carbon_badge_url:
    description: 'Shields.io badge URL showing estimated CO2 saved. Embed in README: ![carbon](url)'
    value: ${{ steps.grid-check.outputs.carbon_badge_url }}
  optimal_dispatch_at:
    description: 'ISO 8601 timestamp of the optimal green window (strategy=queue). "now" if already green, "none_in_deadline" if no window found.'
    value: ${{ steps.grid-check.outputs.optimal_dispatch_at }}
  optimal_zone:
    description: 'The zone recommended for the optimal dispatch window (strategy=queue).'
    value: ${{ steps.grid-check.outputs.optimal_zone }}
  suggested_cron:
    description: 'Suggested cron expression for scheduling green builds based on the zone energy profile (e.g., solar peak, wind peak, off-peak hydro).'
    value: ${{ steps.grid-check.outputs.suggested_cron }}

runs:
  using: 'composite'
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Install dependencies
      shell: bash
      run: uv run --with requests==2.32.* --python 3.11 python -c "print('deps ready')"

    - name: Check grid and dispatch
      id: grid-check
      shell: bash
      run: uv run --with requests==2.32.* --python 3.11 python ${{ github.action_path }}/check_grid.py
      env:
        GRID_ZONE: ${{ inputs.grid_zone }}
        GRID_ZONES: ${{ inputs.grid_zones }}
        EIA_API_KEY: ${{ inputs.eia_api_key }}
        GRID_STATUS_API_KEY: ${{ inputs.gridstatus_api_key }}
        MAX_CARBON: ${{ inputs.max_carbon_intensity }}
        WORKFLOW_ID: ${{ inputs.workflow_id }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        TARGET_REPO: ${{ github.repository }}
        TARGET_REF: ${{ inputs.target_ref }}
        FAIL_ON_API_ERROR: ${{ inputs.fail_on_api_error }}
        ELECTRICITY_MAPS_TOKEN: ${{ inputs.electricity_maps_token }}
        MAX_WAIT: ${{ inputs.max_wait }}
        ENABLE_FORECAST: ${{ inputs.enable_forecast }}
        RUNNER_PROVIDER: ${{ inputs.runner_provider }}
        RUNNER_SPEC: ${{ inputs.runner_spec }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        ENTSOE_TOKEN: ${{ inputs.entsoe_token }}
        STRATEGY: ${{ inputs.strategy }}
        DEADLINE_HOURS: ${{ inputs.deadline_hours }}
        CARBON_POLICY_PATH: ${{ inputs.carbon_policy_path }}
